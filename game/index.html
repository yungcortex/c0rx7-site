<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0612" />
    <title>BEAN ROYALE — Ætherwake</title>
    <meta name="description" content="Cute beans bonking each other for SOL prize pots in the dreaming city of Hyrr." />
    <link rel="icon" type="image/svg+xml" href="/play/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #07040d;
        --bg-mid: #0f0a1a;
        --paper: #f4ead4;
        --gold: #c9a85a;
        --gold-bright: #e8c878;
        --crimson: #a02d3d;
        --aspect-blue: #6ba9d4;
        --ink: #1a1226;
      }
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; }
      body {
        background: radial-gradient(ellipse at 50% 30%, var(--bg-mid) 0%, var(--bg-deep) 70%);
        color: var(--paper);
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        user-select: none;
        -webkit-user-select: none;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: var(--bg-deep);
        color: var(--gold);
        font-family: "Cormorant Garamond", serif;
        letter-spacing: 0.4em;
        font-size: 1.2rem;
        z-index: 9999;
        transition: opacity 0.6s ease;
      }
      #boot.hidden { opacity: 0; pointer-events: none; }
      #boot .pulse {
        animation: pulse 1.6s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
      canvas { outline: none; touch-action: none; }
    </style>
  </head>
  <body>
    <div id="boot">
      <span class="pulse">BEAN ROYALE</span>
    </div>
    <div id="root"></div>
    <canvas id="game-canvas"></canvas>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
